openapi: 3.0.0
info:
  title: Boopy API
  description: A simple demo service.
  version: 1.0.0
servers:
  - url: 'https://localhost:5000'
paths:
  /v1/test/{id}:
    get:
      description: just a quick test
      responses:
        '200':
          description: funny response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
  /v1/test:
    post:
      description: post a test by id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - message
              properties:
                id:
                  type: number
                message:
                  type: string
      responses:
        200:
          description: 'success'


components:
  schemas:
    Response:
      required:
        - id
        - message
      properties:
        id:
          type: number
        message:
          type: string

